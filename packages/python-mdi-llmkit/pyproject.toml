[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mightydatainc-mdi-llmkit"
version = "1.0.8"
description = "Meta-package that installs the core Mighty Data LLM utility packages"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "mightydatainc-llm-conversation>=1.0.5",
  "mightydatainc-json-surgery>=1.2.1",
  "mightydatainc-semantic-match>=1.3.0",
]
authors = [{ name = "Mikhail Voloshin" }]
license = { file = "LICENSE" }

[project.urls]
Homepage = "https://github.com/Mighty-Data-Inc/mdi-llmkit"
Documentation = "https://github.com/Mighty-Data-Inc/mdi-llmkit#readme"
Repository = "https://github.com/Mighty-Data-Inc/mdi-llmkit"

[tool.hatch.build.targets.wheel]
packages = ["src/mdi_llmkit"]
