[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mightydatainc-mdi-llmkit"
version = "1.0.1"
description = "Meta-package that installs the core Mighty Data LLM utility packages"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "mightydatainc-llm-conversation",
  "mightydatainc-json-surgery",
  "mightydatainc-semantic-match",
]
authors = [{ name = "Mikhail Voloshin" }]
license = { file = "LICENSE" }

[tool.hatch.build.targets.wheel]
packages = ["src/mdi_llmkit"]
